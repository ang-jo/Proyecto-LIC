<!DOCTYPE html>
<html lang="ES">
    <head>
        <meta charset="UTF-8" />
            <title>Acciones</title>
            <link href="css/bootstrap.css" rel="stylesheet">
            <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    </head>
<body class="bg-light" style= "background-image: url('img/pokefondo.png'); font-family: 'Press Start 2P', cursive; ">
    
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <!--Menu superior -->

        <div class="container-fluid d-flex flex-column flex-lg-row">
            <ul class="navbar-nav order-1 order-lg-2 ms-lg-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Principal</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Historial</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Gráfico</a>
                </li>
            </ul>      
            <!-- Aqui se pondra el ussuario que se ingreso y su numero de cuenta-->
            <span class="navbar-brand order-2 order-lg-1 text-center text-lg-start">
            Usuario #numero de usuario
        </span>
        </div>
    
</nav>

<div class="container py-4">

    <div  id="principal">
            <!--indicador de en que pagina estas -->

        <div class="card">
            <h4>Panel Principal</h4>
            </div>
        <div class="container py-4">

   

    <!-- Saldo actual, se debe actualizar con el boton actualizar -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body text-center">
            <h6>Saldo actual</h6>
            <h3 id="saldo">$0</h3>
        </div>
    </div>

    <!--acciones del panel principal -->
    <div class="row g-3">

        <!--depositar dinero -->
        <div class="col-md-6">
            <div class="card p-3 shadow-sm">
                <h6>Depositar</h6>
                <input type="number" id="deposito" class="form-control mb-2" placeholder="Monto">
                <button class="btn btn-success w-100">Depositar</button>
            </div>
        </div>

        <!--retirar dinero -->
        <div class="col-md-6">
            <div class="card p-3 shadow-sm">
                <h6>Retirar</h6>
                <input type="number" id="retiro" class="form-control mb-2" placeholder="Monto">
                <button class="btn btn-warning w-100">Retirar</button>
            </div>
        </div>

        <!-- Pagar servicios -->
        <div class="col-md-6">
            <div class="card p-3 shadow-sm">
                <h6>Pagar servicios</h6>
                <input type="number" id="servicio" class="form-control mb-2" placeholder="Monto">
                <button class="btn btn-primary w-100">Pagar</button>
            </div>
        </div>

        <!-- Consultar/ actualizar saldo -->
        <div class="col-md-6">
            <div class="card p-3 shadow-sm d-flex justify-content-center">
              
                <button class="btn btn-info w-100 mt-2">Actualizar</button>
            </div>
        </div>

    </div>

  

</div>
    </div>

    <!-- pestaña de historial de trasnacciones -->
    <div id="historial" class="card d-none">
        <h4>Historial de Transacciones</h4>
        <ul id="listaHistorial" class="list-group"></ul>
    </div>

    <!-- pestaña de graficos -->
    <div id="grafico" class="card d-none">
        <h4>Gráfico de Transacciones</h4>
        
        
    </div>

</div>
    
    
    
    </body>
</html>
